<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translation Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Translation Function Test</h2>
        <div class="card mt-3">
            <div class="card-body">
                <h5>Test Article</h5>
                <p>Apple Inc. reported strong quarterly earnings today, beating analyst expectations.</p>
                <button class="btn btn-primary" id="testTranslateBtn">🇨🇳 翻译成中文</button>
                <div id="testTranslation" class="mt-3 p-3 bg-light d-none"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('testTranslateBtn').addEventListener('click', async function() {
            const btn = this;
            const resultDiv = document.getElementById('testTranslation');
            const text = "Apple Inc. reported strong quarterly earnings today, beating analyst expectations.";
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 翻译中...';
            
            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (data.status === 'success') {
                    resultDiv.innerHTML = `<strong>🇨🇳 中文翻译：</strong><br>${data.translation}`;
                    resultDiv.classList.remove('d-none');
                    btn.innerHTML = '✓ 翻译成功';
                } else {
                    resultDiv.innerHTML = `<strong>错误：</strong>${data.message}`;
                    resultDiv.classList.remove('d-none');
                    btn.innerHTML = '🇨🇳 翻译成中文';
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<strong>错误：</strong>${error.message}`;
                resultDiv.classList.remove('d-none');
                btn.innerHTML = '🇨🇳 翻译成中文';
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
