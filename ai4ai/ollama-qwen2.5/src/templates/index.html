<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahoo Finance News Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">📈 Yahoo Finance News Analyzer</span>
            <span class="navbar-text" id="status-indicator">
                <span class="badge bg-secondary">Checking Ollama...</span>
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Scrape & Analyze Financial News</h5>
                        <p class="card-text">Fetch latest Yahoo Finance news, summarize articles, and analyze sentiment using local Ollama Qwen2.5 model.</p>
                        
                        <div class="row g-3 align-items-center mb-3">
                            <div class="col-auto">
                                <label for="maxArticles" class="col-form-label">Number of articles:</label>
                            </div>
                            <div class="col-auto">
                                <input type="number" id="maxArticles" class="form-control" value="5" min="1" max="20">
                            </div>
                            <div class="col-auto">
                                <button class="btn btn-primary" id="scrapeBtn" onclick="scrapeNews()">
                                    <span id="scrapeSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                                    Scrape Only
                                </button>
                                <button class="btn btn-success" id="analyzeBtn" onclick="scrapeAndAnalyze()">
                                    <span id="analyzeSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                                    Scrape & Analyze
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div id="results"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
